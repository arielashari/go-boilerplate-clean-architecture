version: "2"
sql:
  - schema: "./pkg/database/migrations/"
    queries: "./internal/repository/postgres/queries/"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/postgres/sqlc"
        emit_json_tags: true
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true