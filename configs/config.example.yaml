app:
  name: "myapp"
  port: 8080
  env: "dev"

database:
  postgres:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: "password"
    name: "mydb"
    sslmode: "disable"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "dev-secret-not-for-production"
  access_expire_minutes: 15
  refresh_expire_minutes: 168

ratelimit:
  max_requests: 100
  expiration_seconds: 60

cors:
  allow_origins:
    - "*"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"

smtp:
  host: "smtp.gmail.com"
  port: 587
  username: "your@gmail.com"
  password: "your-app-password"
  from: "your@gmail.com"
  from_name: "Your App"

s3:
  access_key_id: "your-access-key-id"
  secret_access_key: "your-secret-access-key"
  region: "us-east-1"
  bucket: "your-bucket-name"
  base_url: "https://your-bucket-name.s3.amazonaws.com"
  presign_expiry_minutes: 15