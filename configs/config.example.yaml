app:
  name: "myapp"
  port: 8080
  env: "dev"

database:
  postgres:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: "password"
    name: "mydb"
    sslmode: "disable"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "dev-secret-not-for-production"
  access_expire_minutes: 15
  refresh_expire_minutes: 168

ratelimit:
  max_requests: 100
  expiration_seconds: 60

cors:
  allow_origins:
    - "*"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"